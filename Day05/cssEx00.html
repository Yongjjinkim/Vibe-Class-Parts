<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화면 분할</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            width: 100vw;
            height: 100vh;
        }

        /* 전체 화면 */
        .container{
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* 위쪽 영역 */
        .top{
            display: flex;
            flex: 1;
        }

        /* 아래쪽 영역 */
        .bottom{
            flex: 1;
            background-color: white;
            border-top: 1px solid black;
        }

        /* 좌우 분할 */
        .left{
            flex: 1;
            background-color: brown;
        }

        .right{
            flex: 1;
            background-color: pink;
        }

        .left,
        .right{
            border: 1px solid black;
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- 위쪽 -->
        <div class="top">
            <div class="left"></div>
            <div class="right"></div>
        </div>

        <!-- 아래쪽 -->
        <div class="bottom"></div>

    </div>

</body>
</html>
