<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" placeholder="합을 구할 숫자를 입력(10~100사이)">
    <button type="button" onclick="sum();">더하기</button>
    <p>
        결과: <span id="result"></span>
    </p>
    <script>
        function sum() {
            let num = Number(document.querySelector("input").value); // ① 숫자로 변환

            if (num < 10 || num > 100) {
                alert("10~100 사이의 수를 입력해주세요.");
                return;
            }

            let result = 0;
            for (let i = 1; i <= num; i++) {
                result += i;
            }

            // ② span에 결과 표시
            document.getElementById("result").innerText = result;
        }
    </script>
</body>
</html>
